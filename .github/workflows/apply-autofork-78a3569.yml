name: Apply AutoFork Mobile Patch 78a3569

on:
  push:
    branches:
      - main
    paths:
      - '.github/autofork-patches/78a3569-mobile-route-action-controls.patch'
      - '.github/workflows/apply-autofork-78a3569.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch and clean up
        shell: bash
        run: |
          set -euo pipefail
          patch_file='.github/autofork-patches/78a3569-mobile-route-action-controls.patch'
          workflow_file='.github/workflows/apply-autofork-78a3569.yml'
          git apply --check "$patch_file"
          git apply "$patch_file"
          rm -f "$patch_file" "$workflow_file"
          rmdir .github/autofork-patches 2>/dev/null || true
          git status --short
      - name: Commit updated index
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Fix mobile route action controls'
          git push
